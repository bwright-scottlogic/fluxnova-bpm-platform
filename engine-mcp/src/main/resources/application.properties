# -----------------------------------------------------------------------
# Fluxnova BPM - MCP Server
# -----------------------------------------------------------------------

spring.application.name=fluxnova-mcp-server

# MCP server identity (visible to connecting MCP clients / LLM agents)
spring.ai.mcp.server.name=fluxnova-bpm
spring.ai.mcp.server.version=1.0.0

# -----------------------------------------------------------------------
# Server port (change if 8080 conflicts with the main platform)
# -----------------------------------------------------------------------
server.port=8090

# -----------------------------------------------------------------------
# Datasource
# Switch the url/driver/credentials to match your environment.
# The examples below cover H2 (dev), PostgreSQL and H2 in-memory.
# -----------------------------------------------------------------------

# --- H2 file-based (development / demo) --------------------------------
spring.datasource.url=jdbc:h2:file:./fluxnova-dev;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- PostgreSQL (production) -------------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5432/fluxnova
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=fluxnova
# spring.datasource.password=secret

# -----------------------------------------------------------------------
# Fluxnova BPM Spring Boot Starter
# -----------------------------------------------------------------------

# Use 'auto' so the starter applies schema migrations automatically on first boot.
# Set to 'false' once the schema is established.
fluxnova.database.schema-update=true

# History level: none | activity | audit | full
fluxnova.history-level=full

# -----------------------------------------------------------------------
# Disable the web-app / REST endpoints — this module exposes MCP only.
# -----------------------------------------------------------------------
fluxnova.webapp.enabled=false
